name: Update Formulas

on:
  # Manual trigger
  workflow_dispatch:
  
  # Run daily at 00:00 UTC
  schedule:
    - cron: '0 0 * * *'
  
  # Trigger when CLI repos publish releases
  repository_dispatch:
    types: [release-published]

jobs:
  update-formulas:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout tap repository
      uses: actions/checkout@v4
      with:
        # TAP_TOKEN requires repo scope and workflow permissions to create pull requests
        # Generate at: https://github.com/settings/tokens with 'repo' and 'workflow' scopes
        token: ${{ secrets.TAP_TOKEN }}

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Install dependencies
      run: |
        gem install octokit

    - name: Configure git
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"

    - name: Update formulas
      id: update
      env:
        GITHUB_TOKEN: ${{ secrets.TAP_TOKEN }}
        REPOS: |
          dl-alexandre/Apple-Business-Connect-CLI:abc
          dl-alexandre/Apple-Map-Server-CLI:ams
          dl-alexandre/App-StoreKit-CLI:ask
          dl-alexandre/cimis-cli:cimis
          dl-alexandre/cli-template:cli-template
          dl-alexandre/Google-Drive-CLI:gdrv
          dl-alexandre/Google-Play-Developer-CLI:gpd
          dl-alexandre/MyMarketNews-CLI:mpr
          dl-alexandre/Local-UniFi-CLI:unifi
          dl-alexandre/UniFi-Site-Manager-CLI:usm
      run: |
        require 'octokit'
        require 'open-uri'
        require 'digest'

        client = Octokit::Client.new(access_token: ENV['GITHUB_TOKEN'])
        updated = []

        ENV['REPOS'].strip.each_line do |line|
          repo, formula = line.strip.split(':')
          formula_file = "Formula/#{formula}.rb"
          
          next unless File.exist?(formula_file)
          
          begin
            # Get latest release
            release = client.latest_release(repo)
            version = release.tag_name
            
            # Read current formula
            formula_content = File.read(formula_file)
            current_version = formula_content.match(/version "([^"]+)"/)[1]
            
            if version != current_version
              puts "Updating #{formula}: #{current_version} -> #{version}"
              
              # Calculate SHA256 for each platform
              sha256s = {}
              failed_platforms = []
              
              platforms = {
                'darwin-arm64' => 'on_macos arm?',
                'darwin-amd64' => 'on_macos intel?',
                'linux-arm64' => 'on_linux arm?',
                'linux-amd64' => 'on_linux intel?'
              }
              
              platforms.each do |platform, condition|
                url = "https://github.com/#{repo}/releases/download/#{version}/#{formula}-#{platform}.tar.gz"
                begin
                  puts "  Downloading #{platform}..."
                  data = URI.open(url, 'Authorization' => "token #{ENV['GITHUB_TOKEN']}").read
                  sha256 = Digest::SHA256.hexdigest(data)
                  sha256s[platform] = sha256
                  puts "  SHA256: #{sha256}"
                rescue => e
                  puts "  Error: Could not download #{platform}: #{e.message}"
                  failed_platforms << platform
                end
              end
              
              # Fail if core platforms fail (macOS ARM and AMD64, Linux AMD64)
              core_platforms = ['darwin-arm64', 'darwin-amd64', 'linux-amd64']
              core_failures = failed_platforms & core_platforms
              if core_failures.any?
                puts "WARNING: Failed to download core platforms for #{formula}: #{core_failures.join(', ')}"
                puts "Skipping #{formula} - release assets may not be published yet"
                next  # Skip this formula and continue to next one
              end
              
              # Update formula content
              new_content = formula_content.gsub(/version "[^"]+"/, "version \"#{version}\"")
              
              sha256s.each do |platform, sha256|
                # Replace SHA256 for this platform
                pattern = /(#{Regexp.escape(platform)}.*\.tar.gz"\s+sha256\s+")[^"]+/
                if new_content.match?(pattern)
                  new_content = new_content.gsub(pattern, "\\1#{sha256}")
                end
              end
              
              File.write(formula_file, new_content)
              updated << { formula: formula, version: version, repo: repo }
            else
              puts "#{formula} is up to date (#{version})"
            end
          rescue => e
            puts "Error processing #{repo}: #{e.message}"
          end
        end

        # Create PR if any formulas were updated
        if updated.any?
          branch_name = "update-formulas-#{Time.now.strftime('%Y%m%d-%H%M%S')}"
          system("git checkout -b #{branch_name}")
          system("git add Formula/")
          
          commit_message = updated.map { |u| "#{u[:formula]}: #{u[:version]}" }.join("\n")
          system("git commit -m 'Update formulas\n\n#{commit_message}'")
          system("git push origin #{branch_name}")
          
          pr_body = updated.map { |u| "- **#{u[:formula]}**: #{u[:version]} ([#{u[:repo]}](https://github.com/#{u[:repo]}/releases))" }.join("\n")
          client.create_pull_request(
            'dl-alexandre/homebrew-tap',
            'master',
            branch_name,
            'Update formulas',
            "This PR updates the following formulas:\n\n#{pr_body}"
          )
          
          # Set output for pr_created flag
          puts "pr_created=true" >> ENV['GITHUB_OUTPUT']
          puts "Created PR for #{updated.length} formula(s)"
        else
          puts "pr_created=false" >> ENV['GITHUB_OUTPUT']
          puts "All formulas are up to date"
        end
      shell: ruby {0}

  test-formulas:
    needs: update-formulas
    if: needs.update-formulas.outputs.pr_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
    - name: Set up Homebrew
      uses: Homebrew/actions/setup-homebrew@master

    - name: Discover and test formulas
      run: |
        brew tap dl-alexandre/tap
        brew update
        
        # Dynamically discover all formulas in the Formula directory
        FORMULAS=$(find . -name "*.rb" -path "*/Formula/*" -exec basename {} .rb \; | sort)
        
        # Test each discovered formula
        for formula in $FORMULAS; do
          if brew info dl-alexandre/tap/$formula &>/dev/null; then
            echo "Testing $formula..."
            brew install dl-alexandre/tap/$formula
            $formula --version
            brew uninstall dl-alexandre/tap/$formula
          fi
        done
      working-directory: ${{ github.workspace }}
